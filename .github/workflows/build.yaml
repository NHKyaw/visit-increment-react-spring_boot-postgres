env:
  BRANCH_NAME: ${{ github.ref_name }}
  DOCKER_REPO: nhkyaw/visit-record-app

on:
  workflow_call:
    inputs:
      stack: # "react" or "java"
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker tag
        run: |
          if [[ "${BRANCH_NAME}" == "main" || "${BRANCH_NAME}" == "master" ]]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${BRANCH_NAME}" >> $GITHUB_ENV
          fi

      - name: Build & push backend
        if: ${{ inputs.stack == 'java' }}
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/$DOCKER_REPO:backend-${IMAGE_TAG} backend
          docker push ${{ secrets.DOCKER_USERNAME }}/$DOCKER_REPO:backend-${IMAGE_TAG}

      - name: Build & push frontend
        if: ${{ inputs.stack == 'react' }}
        run: |
          docker build -t $DOCKER_REPO:frontend-${IMAGE_TAG} frontend
          docker push $DOCKER_REPO:frontend-${IMAGE_TAG}

      - name: Check if image exists
        id: check-image
        run: |
          FE_IMAGE_NAME="$DOCKER_REPO:frontend-${IMAGE_TAG}"
          BE_IMAGE_NAME="$DOCKER_REPO:backend-${IMAGE_TAG}"

          if docker manifest inspect "$FE_IMAGE_NAME" > /dev/null 2>&1; then
            echo "frontend_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend image exists"
          else
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Frontend image NOT found"
          fi

          if docker manifest inspect "$BE_IMAGE_NAME" > /dev/null 2>&1; then
            echo "backend_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Backend image exists"
          else
            echo "backend_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Backend image NOT found"   
          fi
        