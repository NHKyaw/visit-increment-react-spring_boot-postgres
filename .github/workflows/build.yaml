env:
  BRANCH_NAME: ${{ github.ref_name }}
  DOCKER_REPO: nhkyaw/visit-record-app

on:
  workflow_call:
    inputs:
      stack: # "react" or "java"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker tag
        run: |
          if [[ "${BRANCH_NAME}" == "main" || "${BRANCH_NAME}" == "master" ]]; then
            echo "IMAGE_TAG=prod" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${BRANCH_NAME}" >> $GITHUB_ENV
          fi

      - name: Build & push backend
        if: ${{ inputs.stack == 'java' }}
        run: |
          docker build -t $DOCKER_REPO:backend-${IMAGE_TAG} backend
          docker push $DOCKER_REPO:backend-${IMAGE_TAG}

      - name: Build & push frontend
        if: ${{ inputs.stack == 'react' }}
        run: |
          docker build -t $DOCKER_REPO:frontend-${IMAGE_TAG} frontend
          docker push $DOCKER_REPO:frontend-${IMAGE_TAG}

      - name: Check if image exists
        id: check-image
        run: |
          FE_IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPO:frontend-${IMAGE_TAG}"
          BE_IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/$DOCKER_REPO:backend-${IMAGE_TAG}"

          if docker manifest inspect $FE_IMAGE_NAME > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image $IMAGE_NAME found in Docker Hub."
          else

          if docker manifest inspect $BE_IMAGE_NAME > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image $BE_IMAGE_NAME found in Docker Hub."
          else