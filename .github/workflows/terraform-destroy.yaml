name: Terraform Destroy (Manual + Approval)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev / uat / prod)"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      confirm:
        description: "Type DESTROY to confirm"
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest

    # 🔒 Approval gate (explained below)
    environment: terraform-destroy

    steps:
      - name: Safety check
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. Type DESTROY exactly."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform init -backend-config="key=env/${{ inputs.environment }}/terraform.tfstate"
          terraform destroy \
            -var="environment=${{ inputs.environment }}"
