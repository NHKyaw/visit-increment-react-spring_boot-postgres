name: Terraform Destroy (Manual + Approval)


on:
  workflow_call:
    inputs:
      stack: # "react" or "java"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev / uat / main)"
        required: true
        type: choice
        options:
          - dev
          - uat
          - main
      confirm:
        description: "Type DESTROY to confirm"
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: terraform-destroy

    steps:
      - name: Safety check
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "❌ Confirmation failed. Type DESTROY exactly."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Map branch to environment #$GITHUB_ENV is a special file that sets environment variables for future steps in a job.
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform init -backend-config="key=env/${ENV}/terraform.tfstate"
          terraform destroy \
            -auto-approve \
            -var-file="${ENV}.tfvars"

          echo "✅ Terraform destroy completed for environment: ${ENV}"
