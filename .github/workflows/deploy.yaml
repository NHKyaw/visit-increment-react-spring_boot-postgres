      #     echo "Waiting for SSH connection on $EC2_IP..."

      #     for i in $(seq 1 30); do
      #       if ssh -T \
      #         -o StrictHostKeyChecking=no \
      #         -o ConnectTimeout=5 \
      #         -o BatchMode=yes \
