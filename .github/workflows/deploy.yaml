      # - name: Set File Permission for deploy.sh
      #   run: | 
      #     chmod +x deploy.sh

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKER_REPO 
          # script_path: deploy.sh
          script: |
            set -e
            uptime >> /home/ubuntu/docker/data.log
            whoami >> /home/ubuntu/docker/data.log      
            pwd >> /home/ubuntu/docker/data.log
            groups >> /home/ubuntu/docker/data.log
            printenv | grep -i IMAGE_TAG && echo "IMAGE_TAG is set" >> /home/ubuntu/docker/data.log || echo "IMAGE_TAG not set" >> /home/ubuntu/docker/data.log
            pwd >> /home/ubuntu/docker/data.log
            /usr/bin/docker --version >> /home/ubuntu/docker/data.log
            /usr/bin/docker compose version >> /home/ubuntu/docker/data.log

            sudo chmod +x /home/ubuntu/docker/deploy.sh
            /home/ubuntu/docker/deploy.sh


