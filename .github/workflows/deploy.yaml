name: Deploy Visit Record App

env:
  DOCKER_REPO: nhkyaw/visit-record-app

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Only run on these branches
    if: >-
      github.ref_name == 'dev' ||
      github.ref_name == 'uat' ||
      github.ref_name == 'main' ||
      github.ref_name == 'master'

    env:
      BRANCH_NAME: ${{ github.ref_name }}

    steps:
      - name: Determine deployment environment
        run: |
          case "${{ github.ref_name }}" in
            main|master) echo "ENV=prod"      >> $GITHUB_ENV ;;
            *)           echo "ENV=${{ github.ref_name }}" >> $GITHUB_ENV ;;
          esac

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3   # ← updated to latest stable
        with:
          terraform_wrapper: false

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=env/${{ env.ENV }}/terraform.tfstate"

          terraform apply -auto-approve \
            -var="environment=${{ env.ENV }}"

      - name: Get EC2 public IP from Terraform output
        working-directory: terraform
        run: |
          EC2_IP=$(terraform output -raw ec2_public_ip 2>/dev/null || echo "")

          if [[ -z "$EC2_IP" || "$EC2_IP" == "null" ]]; then
            echo "ERROR: Could not retrieve EC2 public IP from terraform output"
            echo "Check that 'output "ec2_public_ip" { value = ... }' exists"
            exit 1
          fi

          echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV
          echo "Deploying to EC2: $EC2_IP"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem

      - name: Wait for EC2 instance to accept SSH
        run: |
          echo "Waiting for SSH on ${{ env.EC2_IP }} (max 5 minutes)..."

          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i ~/.ssh/ec2.pem \
                   ubuntu@${{ env.EC2_IP }} "echo OK" >/dev/null 2>&1; then
              echo "SSH connection ready"
              exit 0
            fi
            printf "Attempt %02d - still waiting... retrying in 10s\n" $i
            sleep 10
          done

          echo "ERROR: EC2 SSH did not become available in time"
          exit 1

      - name: Add host to known_hosts (optional but helps suppress warnings)
        run: ssh-keyscan -H ${{ env.EC2_IP }} >> ~/.ssh/known_hosts || true

      - name: Copy docker directory to EC2
        run: scp -i ~/.ssh/ec2.pem -r docker/ ubuntu@${{ env.EC2_IP }}:~

      - name: Determine Docker image tag
        run: |
          case "${{ env.BRANCH_NAME }}" in
            main|master) echo "IMAGE_TAG=prod"      >> $GITHUB_ENV ;;
            *)           echo "IMAGE_TAG=${{ env.BRANCH_NAME }}" >> $GITHUB_ENV ;;
          esac

      - name: Deploy application on EC2 via SSH
        run: |
          ssh -tt \
            -o StrictHostKeyChecking=no \
            -i ~/.ssh/ec2.pem \
            ubuntu@${{ env.EC2_IP }} << 'EOF'
            set -euo pipefail

            echo "Running deployment on $(hostname) - $(date)"

            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            export DOCKER_REPO="${{ env.DOCKER_REPO }}"

            cd ~/docker || { echo "Directory ~/docker not found"; exit 2; }

            echo "Docker version info:"
            docker --version
            docker compose version

            echo "Pulling images..."
            docker pull "${DOCKER_REPO}:backend-${IMAGE_TAG}"
            docker pull "${DOCKER_REPO}:frontend-${IMAGE_TAG}"

            echo "Starting deployment..."
            docker compose down --remove-orphans || true

            # Assumes you have .env.dev / .env.uat / .env.prod files already on the instance
            docker compose \
              --env-file ".env.${IMAGE_TAG}" \
              -f docker-compose.yaml \
              up -d --remove-orphans --force-recreate

            echo "Deployment finished."
            docker compose ps
          EOF