  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'dev' || github.ref_name == 'uat' || github.ref_name == 'main' || github.ref_name == 'master'

    steps:
      - name: Map branch to environment #$GITHUB_ENV is a special file that sets environment variables for future steps in a job.
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          fi

      - name: checkout code
        uses: actions/checkout@v4   

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="environment=${ENV}"

      - name: Get EC2 public IP
        working-directory: terraform
        run: |
          IP=$(terraform output -raw ec2_public_ip | tr -d '\n\r ')
          echo "EC2_IP=$IP" >> $GITHUB_ENV


      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

      - name: Copy docker directory to EC2 (scp)
        run: |
          scp -i ~/.ssh/ec2.pem -r docker ubuntu@$EC2_IP:~/

      - name: Run Docker Compose on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem ubuntu@$EC2_IP << 'EOF'
            set -e
            cd ~/docker

            docker pull $DOCKER_REPO:backend-${BRANCH_NAME}
            docker pull $DOCKER_REPO:frontend-${BRANCH_NAME}


            docker compose down
            docker compose --env-file .env.${BRANCH_NAME} -f docker-compose.yml up -d
          EOF

