stages:
  - test


default:
  image: docker:24.0.5-cli
  services:
    - docker:24.0.5-dind
  before_script:
    - docker info


test_build:
  stage: test
  tags:
    - DinD
  script:
    - apk update
    - apk add nodejs npm
    - npm -v
    - node -v
    - ls -al
    - cd frontend && ls -al | grep package.json
    - ls -al | grep node_modules >> /dev/null || echo "node_modules not found"
    - npm install && ls -al | grep node_modules
    - npm run build
    - ls -al | grep dist
    - npm run test

test_unit:
  stage: test
  tags:
    - DinD
  script:
    - pwd 
    - ls -al
    - whoami
