stages:
  - test
  - build
  - deploy

test:
  stage: test
  image: eclipse-temurin:21-jdk
  services:
    - name: postgres:15
      alias: postgres
      command: ["postgres", "-c", "listen_addresses='*'"]
      environment:
        POSTGRES_DB: my_database
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: 12345678
  script:
    - echo "Running backend tests..."
    - cd backend
    - ./mvnw test

