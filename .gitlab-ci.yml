stages:
  - test


default:
  image: docker:24.0.5-cli
  services:
    - docker:24.0.5-dind
  before_script:
    - docker info


##########Reusable code for all containers##########

##Node setup##
.setup_node: &setup_node
  - apk update
  - apk add nodejs npm
  - npm -v
  - node -v
  - cd frontend && ls -al | grep package.json

##Install Dependencies##
.install_deps: &install_deps
  - npm ci --cache ../.npm && ls -al | grep node_modules

##Cache setup##
.cache_pull: &cache_pull
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
    policy: pull

##Container1
test_build:
  stage: test
  tags:
    - DinD
  script:
    - *setup_node
    - ls -al | grep node_modules >> /dev/null || echo "node_modules not found"
    - npm ci && ls -al | grep node_modules
  
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
    policy: push

##Container2
test_unit:
  stage: test
  needs: [test_build]
  tags:
    - DinD
  cache: *cache_pull
  script:
    - *setup_node
    - *install_deps
    - npm run test:ci



linting_test:
  stage: test
  needs: [test_build]
  tags:
    - DinD
  cache: *cache_pull
  script:
    - *setup_node
    - *install_deps
    - npm run lint