stages:
  - test


default:
  image: docker:24.0.5-cli
  services:
    - docker:24.0.5-dind
  before_script:
    - docker info

##Container1
test_build:
  stage: test
  tags:
    - DinD
  script:
    - apk update
    - apk add nodejs npm
    - npm -v
    - node -v
    - cd frontend && ls -al | grep package.json
    - ls -al | grep node_modules >> /dev/null || echo "node_modules not found"
    - npm ci && ls -al | grep node_modules
  
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

##Container2
test_unit:
  stage: test
  needs: [test_build]
  tags:
    - DinD
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/
      - frontend/dist/
  script:
    - pwd 
    - cd frontend && ls -al
    - whoami

