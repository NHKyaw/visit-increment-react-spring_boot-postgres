stages:
  - build


default:
  image: docker:24.0.5-cli
  services:
    - docker:24.0.5-dind
  before_script:
    - docker info


build:
  stage: build
  tags:
    - DinD
  script:
    - apk update
    - apk add nodejs npm
    - npm -v
    - node -v
    - ls -al
    - cd frontend && ls -al | grep package.json
    - cd frontend && ls -al | grep node_modules
    - npm install && ls -al | grep node_modules

