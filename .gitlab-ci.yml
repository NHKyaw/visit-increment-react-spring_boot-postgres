################################ Build stage for both frontend and backend ################################
.docker_image: &docker_image
  image: docker:24.0.5-cli
  services:
    - docker:dind

.docker_login: &docker_login
  - docker login -u nhkyaw -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

fe_build:
  stage: build
  <<: *docker_image
  script:
    - echo "Building the project..."
    - *docker_login
    - pwd
    - cd frontend && ls -al | grep Dockerfile
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_REF_SLUG" -f Dockerfile .
